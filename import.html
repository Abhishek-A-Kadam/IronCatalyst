function fmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

var focusIcons = {push:'💥', pull:'🎯', legs:'🦵'};
var html = '';
var lastMonth = '';
WORKOUTS.forEach(function(w) {
  var m = new Date(w.date + 'T12:00:00').toLocaleDateString('en-US', {month:'long', year:'numeric'});
  if (m !== lastMonth) { html += '<div class="month-label">'+m+'</div>'; lastMonth = m; }
  var icon = focusIcons[w.focusId] || '🏋️';
  html += '<div class="workout-card">';
  html += '<div class="w-header"><div class="w-name">'+icon+' '+w.name+'</div><div class="w-date">'+fmtDate(w.date)+'</div></div>';
  w.exercises.forEach(function(ex) {
    var maxW = 0;
    ex.sets.forEach(function(s) { if (parseFloat(s.w) > maxW) maxW = parseFloat(s.w); });
    var weightStr = maxW > 0 ? ' · up to ' + maxW + ' lbs' : '';
    html += '<div class="ex-row">'+ex.name+' — <span>'+ex.sets.length+' sets'+weightStr+'</span></div>';
  });
  html += '</div>';
});
document.getElementById('preview').innerHTML = html;

function doImport() {
  var btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Importing...';
  try {
    var existing = [];
    try { existing = JSON.parse(localStorage.getItem('il_workouts')) || []; } catch(e) {}
    // Build map from existing workouts
    var map = {};
    existing.forEach(function(w) { map[w.id] = w; });
    // Overwrite with imported data (updates corrected entries)
    WORKOUTS.forEach(function(w) { map[w.id] = w; });
    // Collect all workouts and sort by date
    var merged = [];
    for (var k in map) merged.push(map[k]);
    merged.sort(function(a, b) { return b.date.localeCompare(a.date); });
    localStorage.setItem('il_workouts', JSON.stringify(merged));
    btn.style.display = 'none';
    document.getElementById('done-section').style.display = 'block';
    document.getElementById('done-sub').textContent = 'All ' + merged.length + ' workouts saved. Redirecting...';
    setTimeout(function() { window.location.href = 'index.html'; }, 1800);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Import 13 Workouts →';
    alert('Import failed: ' + e.message);
  }
}
